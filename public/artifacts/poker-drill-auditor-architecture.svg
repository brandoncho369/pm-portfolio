<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title { font-family: Georgia,'Iowan Old Style','Times New Roman',serif; fill:#211C16; }
      .sub   { fill:#8C8378; }
      .bx    { font-size:11.5px; font-weight:700; fill:#211C16; }
      .mn    { font-family: ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-size:8.5px; fill:#5C554B; }
      .step  { font-family: ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-size:8.5px; font-weight:700; letter-spacing:.05em; }
      .lbl   { font-family: ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-size:8.5px; fill:#8C8378; }
      .cap   { font-size:9.5px; fill:#8C8378; }
      .leg   { fill:#5C554B; font-size:10px; }
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#A89E92" stroke-width="1.6"/></marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#1E7A50" stroke-width="1.7"/></marker>
    <marker id="aro" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#B6442F" stroke-width="1.7"/></marker>
  </defs>

  <rect x="14" y="14" width="972" height="512" rx="18" fill="#FBFAF6" stroke="#ECE5DB"/>
  <text class="title" x="40" y="48" font-size="22">Drill-quality auditor: LLM proposes, code disposes</text>
  <text class="sub" x="40" y="69" font-size="12">Poker Ascent internal tooling · ~113k drills sampled by signature, audited, deterministically verified, then triaged</text>

  <!-- step labels -->
  <text class="step" x="604" y="138" text-anchor="middle" fill="#1E7A50">STEP 1 · PROPOSE</text>
  <text class="step" x="799" y="138" text-anchor="middle" fill="#B5852F">STEP 2 · DISPOSE</text>

  <!-- SPINE -->
  <rect x="24" y="150" width="118" height="64" rx="8" fill="#fff" stroke="#D9D2C5"/>
  <text class="bx" x="83" y="178" text-anchor="middle">drills</text>
  <text class="mn" x="83" y="194" text-anchor="middle">~113k generated</text>

  <rect x="170" y="150" width="140" height="64" rx="8" fill="#fff" stroke="#D9D2C5"/>
  <text class="bx" x="240" y="178" text-anchor="middle">Signature sampler</text>
  <text class="mn" x="240" y="194" text-anchor="middle">one rep per pattern</text>

  <rect x="338" y="150" width="156" height="64" rx="8" fill="#fff" stroke="#D9D2C5"/>
  <text class="bx" x="416" y="178" text-anchor="middle">AuditUnit</text>
  <text class="mn" x="416" y="194" text-anchor="middle">positions · stack · tier · prose</text>

  <rect x="522" y="150" width="164" height="64" rx="8" fill="#E4F0EA" stroke="#93C2AC"/>
  <text class="bx" x="604" y="178" text-anchor="middle" fill="#1E7A50">auditDrill · gpt-4o-mini</text>
  <text class="mn" x="604" y="194" text-anchor="middle">json_schema → Finding[]</text>

  <rect x="714" y="150" width="170" height="64" rx="8" fill="#F4ECD9" stroke="#D8C08A"/>
  <text class="bx" x="799" y="178" text-anchor="middle" fill="#8A6520">findingValid · guards</text>
  <text class="mn" x="799" y="194" text-anchor="middle">literal-trigger per category</text>

  <!-- spine arrows -->
  <line x1="142" y1="182" x2="168" y2="182" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
  <text class="lbl" x="155" y="174" text-anchor="middle">dedup</text>
  <line x1="310" y1="182" x2="336" y2="182" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="494" y1="182" x2="520" y2="182" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="686" y1="182" x2="712" y2="182" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
  <text class="lbl" x="699" y="174" text-anchor="middle">verify</text>

  <!-- LOWER ROW -->
  <rect x="414" y="318" width="196" height="58" rx="8" fill="#fff" stroke="#D9D2C5" stroke-dasharray="4 3"/>
  <text class="bx" x="512" y="341" text-anchor="middle">drill-audit-eval · 7 cases</text>
  <text class="mn" x="512" y="356" text-anchor="middle">1 clean + 1 seeded-bad each</text>

  <rect x="626" y="318" width="150" height="58" rx="8" fill="#F5E5DF" stroke="#DDA193"/>
  <text class="bx" x="701" y="341" text-anchor="middle" fill="#B6442F">discarded</text>
  <text class="mn" x="701" y="356" text-anchor="middle">no trigger = false positive</text>

  <rect x="792" y="318" width="192" height="58" rx="8" fill="#fff" stroke="#D9D2C5"/>
  <text class="bx" x="888" y="341" text-anchor="middle">drill_audit_findings</text>
  <text class="mn" x="888" y="356" text-anchor="middle">/admin/drill-audit triage</text>

  <!-- eval gates the LLM (dashed up) -->
  <path d="M540,318 C545,270 560,235 575,216" fill="none" stroke="#A89E92" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text class="lbl" x="470" y="262">gates · must be 7/7</text>

  <!-- guard splits: survivors vs discarded -->
  <path d="M770,214 C740,255 715,290 705,316" fill="none" stroke="#B6442F" stroke-width="1.6" marker-end="url(#aro)"/>
  <text class="lbl" x="640" y="250" fill="#B6442F">no trigger</text>
  <path d="M830,214 C850,255 875,290 885,316" fill="none" stroke="#1E7A50" stroke-width="1.7" marker-end="url(#arg)"/>
  <text class="lbl" x="905" y="250" fill="#1E7A50">survivors</text>

  <!-- caption -->
  <text class="cap" x="40" y="438">Raw LLM ~20% precision → ~80%+ after the deterministic guards. Position false-positives went 23 to 0 on a controlled re-audit, eval held 7/7.</text>

  <!-- legend -->
  <rect x="40" y="468" width="13" height="13" rx="3" fill="#E4F0EA" stroke="#93C2AC"/><text class="leg" x="59" y="479">LLM proposes</text>
  <rect x="168" y="468" width="13" height="13" rx="3" fill="#F4ECD9" stroke="#D8C08A"/><text class="leg" x="187" y="479">code disposes (guards)</text>
  <rect x="356" y="468" width="13" height="13" rx="3" fill="#F5E5DF" stroke="#DDA193"/><text class="leg" x="375" y="479">discarded false positive</text>
  <line x1="540" y1="475" x2="562" y2="475" stroke="#A89E92" stroke-width="1.4" stroke-dasharray="4 3"/><text class="leg" x="568" y="479">eval gate (7/7)</text>
</svg>
