<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title  { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; fill:#211C16; }
      .sub    { fill:#8C8378; }
      .band   { font-weight:700; letter-spacing:.12em; font-size:12px; }
      .step   { font-size:11.5px; fill:#211C16; }
      .stepsm { font-size:9.5px; fill:#8C8378; }
      .num    { font-family: ui-monospace,'SF Mono',Menlo,Consolas,monospace; }
      .stat   { font-family: ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-weight:700; }
      .badge  { font-family: ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-size:9px; }
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#A89E92" stroke-width="1.6"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#93B7A8" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="14" y="14" width="872" height="442" rx="18" fill="#FBFAF6" stroke="#ECE5DB"/>

  <!-- header -->
  <text class="title" x="40" y="56" font-size="23">Onboarding flow — before &#8594; after</text>
  <text class="sub" x="40" y="76" font-size="12">Tonbo · activation funnel · pre-launch redesign</text>

  <!-- ===================== BEFORE ===================== -->
  <text class="band" x="40" y="112" fill="#B6442F">BEFORE</text>
  <text class="sub" x="103" y="112" font-size="11">Discord as the primary interface · 5 required steps</text>

  <!-- before boxes (centers: 96,238,380,522,664) -->
  <g>
    <!-- 1 Pay -->
    <rect x="40" y="124" width="112" height="72" rx="10" fill="#F5E5DF" stroke="#DDA193"/>
    <circle cx="54" cy="138" r="9" fill="#B6442F"/><text class="badge" x="54" y="141.5" fill="#FBFAF6" text-anchor="middle">1</text>
    <text class="step" x="96" y="166" text-anchor="middle">Pay</text>
    <!-- 2 -->
    <rect x="182" y="124" width="112" height="72" rx="10" fill="#F5E5DF" stroke="#DDA193"/>
    <circle cx="196" cy="138" r="9" fill="#B6442F"/><text class="badge" x="196" y="141.5" fill="#FBFAF6" text-anchor="middle">2</text>
    <text class="step" x="238" y="162" text-anchor="middle">Onboarding</text>
    <text class="step" x="238" y="178" text-anchor="middle">email</text>
    <!-- 3 -->
    <rect x="324" y="124" width="112" height="72" rx="10" fill="#F5E5DF" stroke="#DDA193"/>
    <circle cx="338" cy="138" r="9" fill="#B6442F"/><text class="badge" x="338" y="141.5" fill="#FBFAF6" text-anchor="middle">3</text>
    <text class="step" x="380" y="162" text-anchor="middle">Join</text>
    <text class="step" x="380" y="178" text-anchor="middle">Discord</text>
    <!-- 4 -->
    <rect x="466" y="124" width="112" height="72" rx="10" fill="#F5E5DF" stroke="#DDA193"/>
    <circle cx="480" cy="138" r="9" fill="#B6442F"/><text class="badge" x="480" y="141.5" fill="#FBFAF6" text-anchor="middle">4</text>
    <text class="step" x="522" y="162" text-anchor="middle">Verify</text>
    <text class="step" x="522" y="178" text-anchor="middle">email</text>
    <!-- 5 -->
    <rect x="608" y="124" width="112" height="72" rx="10" fill="#F5E5DF" stroke="#DDA193"/>
    <circle cx="622" cy="138" r="9" fill="#B6442F"/><text class="badge" x="622" y="141.5" fill="#FBFAF6" text-anchor="middle">5</text>
    <text class="step" x="664" y="162" text-anchor="middle">Set up</text>
    <text class="step" x="664" y="178" text-anchor="middle">bot</text>

    <!-- arrows -->
    <line x1="154" y1="160" x2="180" y2="160" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
    <line x1="296" y1="160" x2="322" y2="160" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
    <line x1="438" y1="160" x2="464" y2="160" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
    <line x1="580" y1="160" x2="606" y2="160" stroke="#A89E92" stroke-width="1.6" marker-end="url(#ar)"/>
  </g>

  <!-- before stat -->
  <text class="stat" x="838" y="156" font-size="34" fill="#B6442F" text-anchor="end">70%</text>
  <text class="sub" x="838" y="174" font-size="10.5" text-anchor="end">drop off before</text>
  <text class="sub" x="838" y="188" font-size="10.5" text-anchor="end">activation</text>

  <!-- divider -->
  <line x1="40" y1="232" x2="860" y2="232" stroke="#ECE5DB" stroke-dasharray="2 5"/>

  <!-- ===================== AFTER ===================== -->
  <text class="band" x="40" y="270" fill="#1E6F58">AFTER</text>
  <text class="sub" x="92" y="270" font-size="11">Web dashboard is home · Discord demoted to optional alerts</text>

  <!-- after boxes y=282 vcenter=318 -->
  <g>
    <!-- 1 Pay -->
    <rect x="40" y="282" width="112" height="72" rx="10" fill="#E4F0EA" stroke="#93C2AC"/>
    <circle cx="54" cy="296" r="9" fill="#1E6F58"/><text class="badge" x="54" y="299.5" fill="#FBFAF6" text-anchor="middle">1</text>
    <text class="step" x="96" y="324" text-anchor="middle">Pay</text>
    <!-- 2 -->
    <rect x="182" y="282" width="112" height="72" rx="10" fill="#E4F0EA" stroke="#93C2AC"/>
    <circle cx="196" cy="296" r="9" fill="#1E6F58"/><text class="badge" x="196" y="299.5" fill="#FBFAF6" text-anchor="middle">2</text>
    <text class="step" x="238" y="320" text-anchor="middle">Web dashboard</text>
    <text class="stepsm" x="238" y="335" text-anchor="middle">(same site)</text>
    <!-- 3 -->
    <rect x="324" y="282" width="112" height="72" rx="10" fill="#E4F0EA" stroke="#93C2AC"/>
    <circle cx="338" cy="296" r="9" fill="#1E6F58"/><text class="badge" x="338" y="299.5" fill="#FBFAF6" text-anchor="middle">3</text>
    <text class="step" x="380" y="320" text-anchor="middle">Magic-link</text>
    <text class="step" x="380" y="335" text-anchor="middle">sign-in</text>
    <!-- 4 Active (success node) -->
    <rect x="466" y="282" width="112" height="72" rx="10" fill="#1E6F58" stroke="#1E6F58"/>
    <text x="522" y="316" text-anchor="middle" font-size="14" fill="#FBFAF6">&#10003;</text>
    <text class="step" x="522" y="336" text-anchor="middle" fill="#FBFAF6">In the product</text>
    <!-- 5 optional Discord (dashed) -->
    <rect x="608" y="282" width="112" height="72" rx="10" fill="none" stroke="#B6AFA4" stroke-dasharray="4 4"/>
    <text class="step" x="664" y="316" text-anchor="middle" fill="#6E665C">Connect Discord</text>
    <text class="stepsm" x="664" y="331" text-anchor="middle">real-time alerts</text>
    <text class="stepsm" x="664" y="346" text-anchor="middle" font-style="italic">optional</text>

    <!-- arrows -->
    <line x1="154" y1="318" x2="180" y2="318" stroke="#93B7A8" stroke-width="1.6" marker-end="url(#arg)"/>
    <line x1="296" y1="318" x2="322" y2="318" stroke="#93B7A8" stroke-width="1.6" marker-end="url(#arg)"/>
    <line x1="438" y1="318" x2="464" y2="318" stroke="#93B7A8" stroke-width="1.6" marker-end="url(#arg)"/>
    <!-- optional dashed connector -->
    <line x1="580" y1="318" x2="606" y2="318" stroke="#B6AFA4" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ar)"/>
  </g>

  <!-- after stat -->
  <text class="stat" x="838" y="316" font-size="34" fill="#1E6F58" text-anchor="end">16%</text>
  <text class="sub" x="838" y="334" font-size="10.5" text-anchor="end">drop-off</text>
  <text class="sub" x="838" y="348" font-size="10.5" text-anchor="end">4 of 25 new users</text>

  <!-- footnote -->
  <text class="sub" x="40" y="430" font-size="10.5">Target: cut onboarding drop-off ≥50%. Result: 70% &#8594; 16% in the first week. Same number of touchpoints, but the final step became optional and the friction (verification, bot setup) was removed.</text>
</svg>
